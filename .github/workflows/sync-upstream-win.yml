name: Sync Upstream & Build Windows

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/sync-upstream-win.yml"
      - "scripts/codex-update.ps1"
      - "scripts/codex-launcher.cmd"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Build Windows even when upstream is unchanged"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: sync-upstream-win
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  UPSTREAM_REPOSITORY: "Haleclipse/CodexDesktop-Rebuild"
  UPSTREAM_BRANCH: "master"

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.sync.outputs.should_build }}
      checkout_ref: ${{ steps.sync.outputs.checkout_ref }}
      upstream_sha: ${{ steps.sync.outputs.upstream_sha }}
      synced: ${{ steps.sync.outputs.synced }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream
        id: sync
        shell: bash
        env:
          FORCE_BUILD: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.force_build) }}
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

          upstream_sha="$(git rev-parse "upstream/${UPSTREAM_BRANCH}")"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "${upstream_sha}" HEAD; then
            echo "Upstream is already included."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            if [ "${FORCE_BUILD}" = "true" ]; then
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          git merge --no-edit "upstream/${UPSTREAM_BRANCH}"
          synced_sha="$(git rev-parse HEAD)"
          git push origin "HEAD:${GITHUB_REF_NAME}"

          echo "synced=true" >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${synced_sha}" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows artifact
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout synced fork
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.sync.outputs.checkout_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install 7-Zip
        run: choco install 7zip -y

      - name: Add 7zz alias
        shell: powershell
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe" -Force
          echo "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Sync Codex app upstream package
        run: node scripts/sync-upstream.js --force --skip-mac

      - name: Apply Windows patches
        run: node scripts/patch-all.js win

      - name: Build Windows x64
        run: npm run build:win-x64

      - name: Prepare release metadata
        id: package
        shell: powershell
        env:
          REPOSITORY: ${{ github.repository }}
          UPSTREAM_SHA: ${{ needs.sync.outputs.upstream_sha }}
        run: |
          $ErrorActionPreference = "Stop"

          $zip = Get-ChildItem -Path "out" -Filter "Codex-win-x64-*.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $zip) {
            throw "Windows zip was not found in out/"
          }

          if ($zip.BaseName -notmatch '^Codex-win-x64-(.+)$') {
            throw "Unexpected zip name: $($zip.Name)"
          }

          $version = $Matches[1]
          $tag = "v$version"
          $sha256 = (Get-FileHash -LiteralPath $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $assetUrl = "https://github.com/$env:REPOSITORY/releases/download/$tag/$($zip.Name)"

          $manifest = [ordered]@{
            version = $version
            tag = $tag
            assetName = $zip.Name
            url = $assetUrl
            sha256 = $sha256
            size = $zip.Length
            repository = $env:REPOSITORY
            upstreamRepository = "Haleclipse/CodexDesktop-Rebuild"
            upstreamSha = $env:UPSTREAM_SHA
            generatedAt = (Get-Date).ToUniversalTime().ToString("o")
          }

          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path "latest.json" -Encoding ASCII
          "$sha256  $($zip.Name)" | Set-Content -Path "sha256.txt" -Encoding ASCII

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "asset_name=$($zip.Name)" >> $env:GITHUB_OUTPUT
          "sha256=$sha256" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-x64-${{ needs.sync.outputs.upstream_sha }}
          path: out/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          name: Codex Windows ${{ steps.package.outputs.version }}
          body: |
            Automated Windows rebuild for Codex ${{ steps.package.outputs.version }}.

            Upstream repository: `Haleclipse/CodexDesktop-Rebuild`
            Upstream commit: `${{ needs.sync.outputs.upstream_sha }}`
            SHA256: `${{ steps.package.outputs.sha256 }}`
          files: |
            out/*.zip
            latest.json
            sha256.txt
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
